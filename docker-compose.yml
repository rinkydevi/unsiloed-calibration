version: "3.9"

services:
  # ── PostgreSQL (use instead of SQLite for production-like dev) ──────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: unsiloed_calibration
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdev
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Fastify Backend ──────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:localdev@db:5432/unsiloed_calibration
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      PORT: 3001
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: development
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src  # hot reload in dev

  # ── Next.js Frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
